[app]
name = "split-pro"
version = "0.1.0"
description = "Expense splitting app — self-hosted Splitwise alternative"

[runtime.container]
image = "Dockerfile.openhost"
port = 3000

[routing]
# Let NextAuth handle its own auth — all paths accessible without openhost gate
public_paths = ["/"]
health_check = "/"

[resources]
memory_mb = 1024
cpu_millicores = 1000

[data]
app_data = true
